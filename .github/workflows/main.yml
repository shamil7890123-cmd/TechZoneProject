name: TechZone CI-CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore
      run: nuget restore TechZoneProject.sln

    - name: Build and Publish
      run: msbuild TechZoneProject.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:publishUrl="out\\" /p:VisualStudioVersion="17.0"

    - name: List files (диагностика)
      run: |
        echo "=== Содержимое корня ==="
        dir
        echo "=== Поиск папки out ==="
        if (Test-Path out) { 
          echo "Папка out найдена! Содержимое:"
          dir out
        } elseif (Test-Path TechZoneProject\out) {
          echo "Папка TechZoneProject\out найдена!"
          dir TechZoneProject\out
        } else {
          echo "Папка out не найдена. Ищу везде..."
          Get-ChildItem -Recurse -Directory -Name *out*
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: published-app
        path: out/
        if-no-files-found: error
