name: TechZone CI-CD

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore
      run: nuget restore TechZoneProject.sln

    - name: Build and Publish
      # Света, здесь мы создаем папку прямо в корне сервера
      run: msbuild TechZoneProject.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:publishUrl="${{ github.workspace }}\publish\\" /p:VisualStudioVersion="17.0"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: published-app
        # Теперь путь максимально простой и короткий
        path: publish\
        if-no-files-found: error

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: published-app
        path: bin/Release/Publish/

    - name: Build Docker Image
      run: docker build -t techzone-app:latest .
