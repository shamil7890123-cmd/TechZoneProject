name: TechZone CI-CD

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore
      run: nuget restore TechZoneProject.sln

    - name: Build
      run: msbuild TechZoneProject.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:publishUrl="out\\"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: published-app
        path: |
          **/out/**
          **/app.publish/**
          **/*.config
          **/*.dll
        if-no-files-found: error
