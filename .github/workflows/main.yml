name: TechZone CI-CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore
      run: nuget restore TechZoneProject.sln

    - name: Build and Publish
      run: msbuild TechZoneProject.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:publishUrl="bin\\app.publish\\" /p:VisualStudioVersion="17.0"

    - name: Расширенная диагностика
      run: |
        Write-Host "=== Текущая директория ==="
        Get-Location
        Write-Host "`n=== ВСЕ папки в проекте ==="
        Get-ChildItem -Recurse -Directory | Select-Object FullName
        Write-Host "`n=== Поиск .dll файлов (должны быть после публикации) ==="
        Get-ChildItem -Recurse -Filter "*.dll" | Select-Object -First 20 FullName
        Write-Host "`n=== Поиск .aspx или .config файлов ==="
        Get-ChildItem -Recurse -Filter "*.aspx" | Select-Object -First 10 FullName
        Get-ChildItem -Recurse -Filter "web.config" | Select-Object FullName

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: published-app
        path: TechZoneProject/bin/app.publish/
        if-no-files-found: error

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: published-app
        path: app.publish/

    - name: List downloaded files
      run: ls -la app.publish/

    - name: Build Docker Image
      run: docker build -t techzone-app:latest .
