name: TechZone CI-CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore
      run: nuget restore TechZoneProject.sln

    - name: Build and Publish
      run: msbuild TechZoneProject.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem /p:publishUrl="bin\\app.publish\\" /p:VisualStudioVersion="17.0"

    - name: Проверка файлов перед загрузкой
      run: |
        if (Test-Path "TechZoneProject/bin/app.publish/") {
          Write-Host "✅ Папка найдена!"
          Get-ChildItem "TechZoneProject/bin/app.publish/" | Select-Object -First 10
        } else {
          Write-Host "❌ Папка не найдена!"
          Write-Host "Ищу где могло быть..."
          Get-ChildItem -Recurse -Directory -Filter "*app.publish*"
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: published-app
        path: TechZoneProject/bin/app.publish/
        if-no-files-found: error

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: published-app
        path: app.publish/

    - name: List downloaded files
      run: ls -la app.publish/

    - name: Build Docker Image
      run: docker build -t techzone-app:latest .
